[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "paris"

[rpc_endpoints]
somnia = "${SOMNIA_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
